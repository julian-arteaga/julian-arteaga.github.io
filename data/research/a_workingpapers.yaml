- title: "Land-Market Restrictions and Agricultural Productivity under Market Power"
  book: "Job Market Paper"
  links:
  - url: "/pdf/Arteaga_landincolombia_latest.pdf"
    text: "Paper"

  links3:
  - url: https://blogs.worldbank.org/impactevaluations/can-government-restrictions-rural-land-markets-benefit-landless-workers-guest
    text: "[World Bank Development Impact Blog]"
  
  abstract: >
    I investigate how government restrictions on land markets impact the agricultural sector, and assess whether such restrictions can curb distortions that stem from the presence of market power. To do so, I develop a general-equilibrium production model in which large landholders exert market power in both land and labor markets, and where there are limits on land accumulation. Restrictions reduce the inefficiencies arising from market power, but also hinder productive reallocation, with the net effect on productivity depending on initial levels of land concentration. I empirically test the model’s predictions by estimating how a law imposing municipality-specific limits on landholdings in Colombia affected productivity, land concentration, and agricultural labor markets. To estimate the impact of the law, I combine a collection of rich micro-level data sources which include a newly built dataset on municipal agricultural productivity. Exploiting plausibly exogenous variation in restriction stringency across bordering municipalities, I find that imposing restrictions caused a permanent reduction in productivity and only modest reductions in overall land inequality. However, restrictions also increased both agricultural workers’ earnings and the employment share in agriculture, suggesting they were beneficial to landless wage laborers by reducing labor market power.

- title: "Declining Mobility among Mexican-Born Workers in the U.S. Labor Force"
  book: "Revise and Resubmit, Journal of Urban Economics"
  links2:
  - linkText: Ashish Shenoy
    linkURL: https://ashishshenoy.com
  links:
  - url: "/pdf/Paper_Mexican_Mobility_aug2023.pdf"
    text: "Paper"
  abstract: >
    Geographic mobility is a key component of labor supply elasticity. We document a reversal in the relative migration elasticity of Mexican immigrants in the U.S. relative to native-born workers. In 2000--2012, Mexican immigrants' location choice was more responsive to local economic conditions, with the gap expanding over the period. This pattern subsequently reversed, and by 2020 native-born workers had a greater migration elasticity than their Mexican-born counterparts. This reversal is unique to immigrants of Mexican origin, does not correspond to geographic differences in immigration policy, and is not explained by the occupational or demographic composition of the Mexican-born labor force.

- title: "Farm Size Distribution, Weather Shocks, and Agricultural Productivity"
  links2:
  - linkText: Nicolás de Roux,
    linkURL: https://sites.google.com/site/nicoderoux/
  - linkText: Margarita Gáfaro,
    linkURL: https://investiga.banrep.gov.co/es/profile/63
  - linkText: Ana María Ibáñez,
    linkURL: http://www.anamariaibanez.net
  - linkText: Heitor Pellegrina
    linkURL: https://sites.google.com/site/heitorpellegrina/
  links:
  - url: "/pdf/ADGIP_2025.pdf"
    text: "Paper"
  links3:
  - url: "https://voxdev.org/topic/agriculture/how-will-climate-change-shape-land-markets-and-farm-sizes-developing-world"
    text: "[VoxDev]"
  abstract: >
    This paper studies the dynamics of farm size distribution, how they are influenced by weather shocks, and the implications for aggregate productivity. Using data from several developing countries, we first document new empirical facts about households’ landholding choices and how weather shocks influence these decisions. Building on a rich longitudinal dataset for Colombia on farm sizes, land transactions, and households’ consumption and investment decisions, we then show that weather shocks increase the frequency of land sales and reduce farm sizes within municipalities, especially among smaller farms. To rationalize these facts, we develop a dynamic, heterogeneous house- hold model in which uninsured farmers make landholding and occupational choices. Our calibrated model shows that uninsured risk substantially curbs aggregate agricul- tural productivity, and that the effects of temporary weather shocks on farm size and agricultural output are highly persistent, taking more than a decade to fade out.

- title: "Yield Gains from Balancing Fertilizer Use: Evidence from Eastern India"
  links2:
  - linkText: Klaus Deininger
    linkURL: https://www.worldbank.org/en/about/people/k/klaus-deininger
  book: "Revise and Resubmit, American Journal of Agricultural Economics"
  links:
  - url: "/pdf/WB-PRWP%2011134.pdf"
    text: "Paper"
  links3:
  - url: "https://www.ideasforindia.in/topics/agriculture/balancing-fertiliser-use-for-higher-yields-and-sustainable-agriculture"
    text: "[Ideas 4 India]"
  abstract: >
    As with most agricultural inputs, the optimal use of fertilizer leverages the production complementarities between different types of nutrients. Wide variation in the intensity of nutrient application rates suggests there are potentially large productivity gains to be had from rebalancing fertilizer use across nutrient types even under a fixed expenditure budget. Using detailed information on a large sample of rice fields across three states in eastern India, this paper investigates whether a more balanced use of fertilizer—measured as the ratio of potash to nitrogen applied to a field—can lead to higher yields and revenues. To address the endogeneity of fertilizer application decisions, the analysis exploits the fact that nitrogen-based fertilizers demanded by Indian farmers are mostly produced domestically in a limited number of manufacturing plants, while all potash-based fertilizers must be imported by ship from abroad. Instrumenting for the ratio of potassium-to-nitrogen fertilizer applied on a field with the relative travel distances between farmers' villages and both the nearest urea production plant and the nearest international port, the paper estimates the impact of more balanced fertilizer use on yields and revenues. The estimates show that at median levels of fertilizer use, and keeping the level of expenditure on fertilizers constant, rebalancing fertilizer application choices such that the potassium-to-nitrogen ratio of fertilizer is doubled would lead to a 4.8 percent increase in yield.

- title: "Mexican Migration Flows and Agricultural Labor Markets in the U.S."
  links2:
  - linkText: Ashish Shenoy
    linkURL: https://ashishshenoy.com
  links:
  - url: "/pdf/mexmiglabor_v2.pdf"
    text: "Paper"
  abstract: >
    Using information on migratory ﬂows for every Mexican municipality and U.S. county pair throughout the 2006–2019 period, this paper estimates the eﬀect that variations in Mexican migration ﬂows have on U.S. agricultural labor-market outcomes. We instrument for migration-driven changes in local labor supply using a shift-share variable that combines Mexican municipality-level violence levels with preexisting migration network patterns. Our estimates show that, in the short run, decreasing migration rates put upward pressure on wages across all types of agricultural workers, and cause a large increase in the number of H-2A seasonal worker visas requested by employers. Conversely, in the long run, decreasing migration rates lead to lower wages in agriculture accompanied by slight reductions in employment levels. Regarding the mechanisms driving this result, we ﬁnd that an exogenous decrease in the cumulative number of migrants arriving to a county during this period led to reductions in the acreage planted with labor-intensive crops, higher rates of mechanization, and lower average farmland values.

  
    